<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;">
    <title>Neon Runner - Cyberpunk Endless Runner</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Game Header -->
        <header id="game-header">
            <div class="header-content">
                <h1 class="game-title">
                    <span class="neon-text">NEON</span>
                    <span class="neon-text-secondary">RUNNER</span>
                </h1>
                <div class="game-stats">
                    <div class="stat-item">
                        <span class="stat-label">SCORE</span>
                        <span id="score" class="stat-value neon-text">000000</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">LEVEL</span>
                        <span id="level" class="stat-value neon-text">01</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">LIVES</span>
                        <span id="lives" class="stat-value neon-text">03</span>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Game Canvas -->
        <main id="game-main">
            <canvas id="game-canvas" width="800" height="600"></canvas>
            
            <!-- Game Overlay UI -->
            <div id="game-overlay">
                <!-- Loading Screen -->
                <div id="loading-screen" class="overlay-screen">
                    <div class="loading-content">
                        <div class="neon-text loading-title">INITIALIZING</div>
                        <div class="loading-bar">
                            <div id="loading-progress" class="loading-fill"></div>
                        </div>
                        <div class="loading-status">Loading game assets...</div>
                    </div>
                </div>

                <!-- Start Screen -->
                <div id="start-screen" class="overlay-screen hidden">
                    <div class="start-content">
                        <h2 class="neon-text start-title">READY TO RUN?</h2>
                        <div class="controls-info">
                            <div class="control-item">
                                <span class="key-icon">UP</span>
                                <span class="key-label">MOVE UP</span>
                            </div>
                            <div class="control-item">
                                <span class="key-icon">DOWN</span>
                                <span class="key-label">MOVE DOWN</span>
                            </div>
                            <div class="control-item">
                                <span class="key-icon">LEFT</span>
                                <span class="key-label">MOVE LEFT</span>
                            </div>
                            <div class="control-item">
                                <span class="key-icon">RIGHT</span>
                                <span class="key-label">MOVE RIGHT</span>
                            </div>
                        </div>
                        <button id="start-button" class="neon-button">START GAME</button>
                    </div>
                </div>

                <!-- Game Over Screen -->
                <div id="game-over-screen" class="overlay-screen hidden">
                    <div class="game-over-content">
                        <h2 class="neon-text game-over-title">GAME OVER</h2>
                        <div class="final-stats">
                            <div class="final-stat">
                                <span class="stat-label">FINAL SCORE</span>
                                <span id="final-score" class="neon-text">000000</span>
                            </div>
                            <div class="final-stat">
                                <span class="stat-label">BEST SCORE</span>
                                <span id="best-score" class="neon-text">000000</span>
                            </div>
                        </div>
                        <div class="game-over-actions">
                            <button id="restart-button" class="neon-button">PLAY AGAIN</button>
                            <button id="menu-button" class="neon-button-secondary">MAIN MENU</button>
                        </div>
                    </div>
                </div>

                <!-- Pause Screen -->
                <div id="pause-screen" class="overlay-screen hidden">
                    <div class="pause-content">
                        <h2 class="neon-text pause-title">PAUSED</h2>
                        <button id="resume-button" class="neon-button">RESUME</button>
                        <button id="pause-menu-button" class="neon-button-secondary">MAIN MENU</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Game Footer -->
        <footer id="game-footer">
            <div class="footer-content">
                <div class="game-info">
                    <span class="version">v1.0.0</span>
                    <span class="separator">|</span>
                    <span class="engine">Neon Engine</span>
                </div>
                <div class="performance-stats">
                    <span id="fps-counter" class="perf-stat">FPS: 60</span>
                    <span class="separator">|</span>
                    <span id="frame-time" class="perf-stat">16ms</span>
                </div>
            </div>
        </footer>
    </div>

    <!-- Audio Elements -->
    <div id="audio-container" class="hidden">
        <audio id="background-music" loop>
            <source src="assets/audio/background.mp3" type="audio/mpeg">
        </audio>
        <audio id="move-sound">
            <source src="assets/audio/move.mp3" type="audio/mpeg">
        </audio>
        <audio id="collect-sound">
            <source src="assets/audio/collect.mp3" type="audio/mpeg">
        </audio>
        <audio id="crash-sound">
            <source src="assets/audio/crash.mp3" type="audio/mpeg">
        </audio>
    </div>

    <!-- Scripts -->
    <script type="module" src="main.js"></script>
</body>
</html>
