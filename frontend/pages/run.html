<div class="panel" id="panel-run">
  <div class="section-header">
    <div class="section-title">Execute</div>
  </div>
  <div class="run-form">
    <div class="run-selects">
      <div class="form-group">
        <label class="form-label">Work Item</label>
        <select class="form-select" id="runWorkItem"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Orchestrator</label>
        <select class="form-select" id="runOrchestrator"></select>
      </div>
    </div>
    <div>
      <button class="btn btn-run" id="runBtn" onclick="executeRun()">&#9654; Run</button>
    </div>
  </div>

  <div class="log-stream" id="liveLog" style="display:none">
    <div class="log-header">
      <div class="log-title">LIVE OUTPUT</div>
      <div id="liveLogStatus" style="font-family:var(--mono); font-size:11px; color:var(--amber)">
        <span class="spinner"></span> running
      </div>
    </div>
    <div class="log-body" id="liveLogBody"></div>
  </div>
</div>
